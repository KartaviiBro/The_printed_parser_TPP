[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".venv", "data", "build", "dist", "migrations"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # line length is enforced softly via formatter, not as an error

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["."]  # make project root importable under bare `pytest` (as CI runs it)
