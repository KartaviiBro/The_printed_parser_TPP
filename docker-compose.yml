services:
  tpp:
    build: .
    container_name: the-printed-parser
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database and downloaded images across restarts.
      - ./data:/app/data
    environment:
      - TPP_DATABASE_URL=sqlite:////app/data/database.db
    # Chromium needs a decent amount of shared memory.
    shm_size: "1gb"
    restart: unless-stopped
